name: Build & deploy admin

# 改 board-neo 源码并推 main → 自动构建 → 把产物推到子模块仓库
# restaurant8/board-neo-admin-dist → 在 restaurant8/Xboard 更新子模块指针。
# 服务器: git pull && git submodule update --init --recursive && php artisan optimize:clear
#
# 需在 board-neo 仓库 Secrets 配置 XBOARD_DEPLOY_TOKEN:
#   Fine-grained PAT，对 restaurant8/board-neo-admin-dist 与 restaurant8/Xboard
#   均授予 Contents: Read and write。

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
    steps:
      - name: Checkout board-neo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Checkout dist submodule repo
        uses: actions/checkout@v4
        with:
          repository: restaurant8/board-neo-admin-dist
          token: ${{ secrets.XBOARD_DEPLOY_TOKEN }}
          path: admin-dist
          ref: main

      - name: Sync build into dist repo
        run: |
          D=admin-dist
          rm -rf "$D/assets"
          rm -f "$D/manifest.json" "$D/index.html" "$D/index.legacy.html" \
                "$D/dns-auto-sync-ui.js" "$D/node-backend-manager.js" \
                "$D/dns-sync-manager.js" "$D/user-usage-record.js"
          cp -r dist/assets "$D/assets"
          if [ -d dist/images ]; then rm -rf "$D/images"; cp -r dist/images "$D/images"; fi
          cp dist/.vite/manifest.json "$D/manifest.json"

      - name: Commit & push dist repo
        id: dist
        run: |
          cd admin-dist
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "rebuild from board-neo@${GITHUB_SHA::7}"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Checkout Xboard
        uses: actions/checkout@v4
        with:
          repository: restaurant8/Xboard
          token: ${{ secrets.XBOARD_DEPLOY_TOKEN }}
          path: xboard
          ref: main

      - name: Bump submodule pointer in Xboard
        run: |
          cd xboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git update-index --cacheinfo 160000,${{ steps.dist.outputs.sha }},public/assets/admin
          if git diff --cached --quiet; then
            echo "pointer unchanged"
          else
            git commit -m "chore(admin): bump admin submodule to ${GITHUB_SHA::7}"
            git push
          fi

      # 可选：构建后自动 SSH 到服务器更新（配了 SSH_* secret 才执行）
      - name: (可选) SSH 部署到服务器
        if: ${{ env.SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.SITE_PATH }}
            git pull --ff-only
            git submodule update --init --recursive
            php artisan optimize:clear
