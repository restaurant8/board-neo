name: Build admin (no server deploy)

# 改 board-neo 源码并推 main → 自动构建 → 把产物推到子模块仓库
# restaurant8/board-neo-admin-dist。
#
# 注意：本工作流【不会】改动 restaurant8/Xboard 仓库，也【不会】SSH 到服务器，
# 因此推送 board-neo 不会影响线上后台——服务器保持当前（原版）admin 不变。
#
# 将来若要把线上切到本项目：手动在 Xboard 仓库把 .gitmodules 的
# public/assets/admin 改指向 board-neo-admin-dist，并 bump 子模块指针，再在
# 服务器执行 git pull && git submodule update --init --recursive && php artisan optimize:clear。
#
# 需在 board-neo 仓库 Secrets 配置 XBOARD_DEPLOY_TOKEN:
#   Fine-grained PAT，对 restaurant8/board-neo-admin-dist 授予 Contents: Read and write。

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout board-neo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Checkout dist submodule repo
        uses: actions/checkout@v4
        with:
          repository: restaurant8/board-neo-admin-dist
          token: ${{ secrets.XBOARD_DEPLOY_TOKEN }}
          path: admin-dist
          ref: main

      - name: Sync build into dist repo
        run: |
          D=admin-dist
          rm -rf "$D/assets"
          rm -f "$D/manifest.json" "$D/index.html" "$D/index.legacy.html" \
                "$D/dns-auto-sync-ui.js" "$D/node-backend-manager.js" \
                "$D/dns-sync-manager.js" "$D/user-usage-record.js"
          cp -r dist/assets "$D/assets"
          if [ -d dist/images ]; then rm -rf "$D/images"; cp -r dist/images "$D/images"; fi
          cp dist/.vite/manifest.json "$D/manifest.json"

      - name: Commit & push dist repo
        id: dist
        run: |
          cd admin-dist
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "rebuild from board-neo@${GITHUB_SHA::7}"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # 到此为止：仅构建并把产物推到 board-neo-admin-dist。
      # 【已移除】改写 Xboard 子模块指针 与 SSH 部署两步，
      # 确保推送 board-neo 不会影响线上后台（服务器保持原版 admin）。

  # 独立部署（standalone）自更新：构建 base=/ 的 SPA，推到本仓库 dist-standalone
  # 分支。站点根的 update.php 比对/拉取的就是该分支 → 后台「系统更新」自动识别。
  # 后端地址不写死进产物：由 dist-standalone 分支上的 settings.js 运行时提供，
  # 故本作业【保留】分支已有的 settings.js，仅替换构建产物。
  build-standalone:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout board-neo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build standalone (base=/，后端由 settings.js 运行时配置)
        env:
          VITE_DEPLOY_MODE: standalone
        run: |
          npm ci
          npm run build:standalone

      - name: Checkout dist-standalone branch
        uses: actions/checkout@v4
        with:
          ref: dist-standalone
          path: standalone-out

      - name: Sync build into dist-standalone (保留分支上的 settings.js)
        run: |
          D=standalone-out
          # 备份分支现有 settings.js（运行时后端配置，不能被构建默认模板覆盖）
          cp "$D/settings.js" /tmp/keep-settings.js 2>/dev/null || true
          # 整目录替换旧产物（保留 .git），避免 hash 资源堆积
          find "$D" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r dist/. "$D/"
          # 还原分支的 settings.js（分支原本没有时则沿用构建产物里的默认模板）
          if [ -f /tmp/keep-settings.js ]; then cp /tmp/keep-settings.js "$D/settings.js"; fi

      - name: Commit & push dist-standalone
        run: |
          cd standalone-out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "build: standalone dist from board-neo@${GITHUB_SHA::7}"
            git push
          fi
